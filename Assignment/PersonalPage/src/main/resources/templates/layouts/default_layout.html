<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title th:replace="${title}">기본 타이틀</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh;">

    <div th:replace="~{fragments/header :: mainHeader}"></div>

    <main style="flex: 1; max-width: 1000px; width: 100%; margin: 0 auto; padding: 40px 20px; box-sizing: border-box;">
        <div th:replace="${content}">
            <p>실제 본문 내용이 이 영역을 대체하게 됩니다.</p>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: mainFooter}"></div>

</body>
</html>
