</head>
<body class="container mt-5">

<h1>Add Dept</h1>

	th:object="${dept}" 와 th:field="*{deptno}" 를 쓰는 이유는
	Thymeleaf의 폼 바인딩(Form Binding)을 통해 화면(Form) ↔ 객체(Model) ↔ 서버(Controller)를 
	자동으로 매핑하기 위해서입니다.

    즉, 입력 폼과 객체를 1:1로 연결하여 개발을 단순화하고 유지보수를 쉽게 하기 위해 사용하는 기능

    	<input type="text" th:field="*{deptno}">
	</form>

    실 랜더링 된 코드

    	<input type="text" id="deptno" name="deptno" value="10">
	</form>

<form th:action="@{/dept/add}" th:object="${dept}" method="post" class="mb-3">
    <div class="mb-3">
        <label>Deptno</label>
        <input type="number" th:field="*{deptno}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Dname</label>
        <input type="text" th:field="*{dname}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Loc</label>
        <input type="text" th:field="*{loc}" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a th:href="@{/dept}" class="btn btn-secondary">Back</a>
</form>

</body>
</html>
