spring.application.name=kosa_1

#포트 설정 (webserver)
server.port=8090 


#DB작업  (기본 설정 : hikariDataSource 사용) **

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=springuser
spring.datasource.password=1004



#pool 사용할려면 추가
# HikariCP 설정 (spring.datasource.hikari로 시작)
# 최대 커넥션 수
# 최소 유휴 커넥션 수
# 커넥션 최대 유휴 시간 (ms)
# 커넥션 요청 최대 대기시간 (ms)
# 커넥션 최대 수명 (ms)
# 생략가능 .... 설정필요없다면 
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5         
spring.datasource.hikari.idle-timeout=30000     
spring.datasource.hikari.connection-timeout=30000 
spring.datasource.hikari.max-lifetime=1800000   


#Mybatis  **
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=kr.or.kosa.model


#JSP  사용하기 위한 ViewResolver 설정  **
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 내장 톰켓 서버가 JSP 처리하도록 설정
#spring.mvc.view.view-names=*.jsp  


# 한글처리
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true



